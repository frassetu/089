<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Astreinte – Actions rapides</title>
  <link rel="stylesheet" href="src/style.css" />
  <link rel="stylesheet" href="src/theme.css" />
</head>
<body>

  <nav class="topbar">
    <button id="openMenu" class="menu-btn">☰</button>
    <h1 class="title">Actions rapides</h1>
  </nav>

  <aside id="menuPanel" class="menu hidden">
    <div class="menu-content">
      <button id="closeMenu" class="close-btn">✕</button>
      <h2>Menu</h2>
      <ul class="menu-list">
        <li data-route="actions">⚡ Actions rapides</li>
        <li data-route="interventions">📋 Liste interventions</li>
        <li data-route="synthese">📊 Synthèse période</li>
        <li data-route="accueil">🔄 Nouvelle période</li>
      </ul>
    </div>
  </aside>

  <main class="container">
    <section class="card">
      <h2>Intervention rapide</h2>
      <div class="buttons-grid">
        <button class="btn fast" data-duree="15">+15</button>
        <button class="btn fast" data-duree="30">+30</button>
        <button class="btn fast" data-duree="45">+45</button>
        <button class="btn fast" data-duree="60">+1h</button>
      </div>
      <button id="manual" class="btn secondary full">Intervention manuelle</button>
    </section>
  </main>

  <div id="popupOverlay" class="popup hidden">
    <div class="popup-box">
      <h2>⚠ Hors astreinte</h2>
      <p id="popupMessage"></p>
      <div class="popup-buttons">
        <button id="popupCancel" class="btn secondary">Annuler</button>
        <button id="popupConfirm" class="btn primary">Confirmer</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
    }
  </script>
  <script type="module" src="src/router.js"></script>
  <script type="module" src="src/ui.js"></script>
  <script type="module" src="src/actions.js"></script>
</body>
</html>
